<!-- ─── SIDEBAR ─── -->
<aside class="sidebar" [class.collapsed]="!sidebarOpen">
  <div class="sidebar-header">
    <img src="logo-cac.png" alt="CAC" class="sidebar-logo" />
    <span class="sidebar-title" *ngIf="sidebarOpen">CAC Admin</span>
  </div>

  <nav class="sidebar-nav">
    <span class="sidebar-section">MENU</span>
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      class="sidebar-link"
    >
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <ng-container *ngIf="item.icon === 'dashboard'">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </ng-container>
        <ng-container *ngIf="item.icon === 'people'">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
        </ng-container>
        <ng-container *ngIf="item.icon === 'sports'">
          <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </ng-container>
        <ng-container *ngIf="item.icon === 'article'">
          <path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/>
          <line x1="10" y1="6" x2="18" y2="6"/><line x1="10" y1="10" x2="18" y2="10"/><line x1="10" y1="14" x2="14" y2="14"/>
        </ng-container>
        <ng-container *ngIf="item.icon === 'calendar'">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </ng-container>
        <ng-container *ngIf="item.icon === 'photo'">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </ng-container>
      </svg>
      <span class="sidebar-label" *ngIf="sidebarOpen">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Logout en bas de la sidebar -->
  <div class="sidebar-footer" *ngIf="sidebarOpen">
    <button class="sidebar-logout" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Déconnexion
    </button>
  </div>
</aside>

<!-- ─── MAIN ─── -->
<div class="main" [class.expanded]="!sidebarOpen">
  <header class="topbar">
    <button class="topbar-toggle" (click)="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar">{{ user.nom?.charAt(0) || 'A' }}</div>
        <div class="topbar-info">
          <span class="topbar-name">{{ user.nom || 'Admin' }}</span>
          <span class="topbar-role">{{ user.email }}</span>
        </div>
      </div>
    </div>
  </header>

  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
